server {
    listen 80;
    server_name iagro360.xyz www.iagro360.xyz localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para que cargue rápido
    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;

    # Cache para estáticos
    location ~* \.(css|js|jpe?g|png|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Rutas limpias: /privacidad sirve privacidad.html, etc.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    # Cabeceras básicas de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
